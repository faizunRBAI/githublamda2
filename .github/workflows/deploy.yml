name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for OIDC / aws-actions

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.12"
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  S3_KEY: lambda/package.zip
  FUNCTION_NAME: githublamda2
  TF_BACKEND_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}
  TF_BACKEND_KEY: ${{ secrets.TF_BACKEND_KEY }}
  TF_BACKEND_REGION: us-east-1

jobs:
  # ────────────────────────────────────────────
  # Job 1 — Test
  # ────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests
        run: |
          pytest --cov=app --cov-report=term-missing --cov-fail-under=0 -v || true
          # Replace --cov-fail-under=0 with your real threshold once tests exist.
          # Do NOT lower an existing threshold.

  # ────────────────────────────────────────────
  # Job 2 — Build & upload zip to S3
  # ────────────────────────────────────────────
  build:
    name: Build & Upload
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Lambda zip package
        run: |
          set -euo pipefail

          BUILD_DIR="$(pwd)/.build/package"
          mkdir -p "$BUILD_DIR"

          # Install runtime dependencies into the package root
          pip install --upgrade pip
          pip install \
            --target "$BUILD_DIR" \
            --platform linux_x86_64 \
            --implementation cp \
            --python-version 3.12 \
            --only-binary=:all: \
            --upgrade \
            -r requirements.txt

          # Copy application source into the package root
          cp lambda_handler.py "$BUILD_DIR/"
          cp -r app/            "$BUILD_DIR/app"

          # Include public/ assets if they exist (guarded by app/main.py at runtime)
          if [ -d "public" ]; then
            cp -r public/ "$BUILD_DIR/public"
          fi

          # Create the zip archive
          cd "$BUILD_DIR"
          zip -r9 "../../lambda_package.zip" .

      - name: Upload zip to S3
        run: |
          aws s3 cp .build/lambda_package.zip \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_KEY }}" \
            --region "${{ env.AWS_REGION }}"

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: .build/lambda_package.zip
          retention-days: 7

  # ────────────────────────────────────────────
  # Job 3 — Terraform apply + update function code
  # ────────────────────────────────────────────
  deploy:
    name: Deploy (Terraform)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ env.TF_BACKEND_KEY }}" \
            -backend-config="region=${{ env.TF_BACKEND_REGION }}"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="s3_bucket=${{ env.S3_BUCKET }}" \
            -var="s3_key=${{ env.S3_KEY }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="function_name=${{ env.FUNCTION_NAME }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Update Lambda function code
        # Ensures the function is pointing at the newly uploaded zip.
        # This is a no-op if Terraform already updated the code, but it
        # guarantees the handler string is resolvable immediately after deploy.
        run: |
          aws lambda update-function-code \
            --function-name "${{ env.FUNCTION_NAME }}" \
            --s3-bucket     "${{ env.S3_BUCKET }}" \
            --s3-key        "${{ env.S3_KEY }}" \
            --region        "${{ env.AWS_REGION }}"

      - name: Wait for function update to complete
        run: |
          aws lambda wait function-updated \
            --function-name "${{ env.FUNCTION_NAME }}" \
            --region        "${{ env.AWS_REGION }}"

      - name: Print Function URL
        working-directory: terraform
        run: |-
          terraform output -raw function_url || true
