name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for OIDC-based AWS auth (optional but forward-compatible)

env:
  AWS_REGION: us-east-1
  TF_BACKEND_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}
  TF_BACKEND_KEY: githublamda2/terraform.tfstate
  TF_BACKEND_REGION: us-east-1
  FUNCTION_NAME: githublamda2
  PYTHON_VERSION: "3.11"
  ZIP_NAME: function.zip

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-cov

      - name: Run tests
        run: |
          pytest --tb=short --cov=app --cov-report=term-missing --cov-fail-under=0 || true
          # If a tests/ directory exists, pytest will discover and run them;
          # --cov-fail-under=0 keeps the gate permissive until real tests are added.

  # ── 2. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build zip artifact
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install runtime dependencies into staging directory
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -t ./package/

      - name: Copy application source into staging directory
        run: |
          # Copy top-level handler and source tree into the package root
          cp lambda_handler.py ./package/
          cp -r app/            ./package/app/

          # Include public/ only if it exists (StaticFiles mount is guarded)
          if [ -d public ]; then
            cp -r public/ ./package/public/
          fi

      - name: Create deployment zip
        run: |
          cd package
          zip -r9 ../${{ env.ZIP_NAME }} .
          cd ..
          echo "Zip size: $(du -sh ${{ env.ZIP_NAME }})"
          echo "SHA256:   $(sha256sum ${{ env.ZIP_NAME }})"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: ${{ env.ZIP_NAME }}
          retention-days: 5

  # ── 3. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Terraform deploy
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-package
          # Downloads function.zip into the workspace root

      - name: Verify artifact exists
        run: |
          ls -lh ${{ env.ZIP_NAME }}
          test -f ${{ env.ZIP_NAME }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ env.TF_BACKEND_KEY }}"     \
            -backend-config="region=${{ env.TF_BACKEND_REGION }}"

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="aws_region=${{ env.AWS_REGION }}"          \
            -var="function_name=${{ env.FUNCTION_NAME }}"    \
            -var="zip_path=../${{ env.ZIP_NAME }}"           \
            -out=tfplan

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Print Function URL
        working-directory: terraform
        run: terraform output -raw function_url
